<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nghia X Blog</title>
    <link rel="stylesheet" href="../assets/css/main.css" />
    
    <style>
        /* Giữ lại các style riêng của trang Blog nhưng xóa phần .back-btn cũ */
        body {
            background-color: #1b1f22;
            color: #ffffff;
            margin: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 60px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 2.5em;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        /* Tùy chỉnh riêng cho nút quay lại để nó cách lề đẹp hơn */
        .header .button {
            margin-top: 20px;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }

        .blog-item {
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
        }

        .blog-item:hover {
            transform: translateY(-8px);
        }

        .image-wrapper {
            aspect-ratio: 1/1;
            overflow: hidden;
            border-radius: 12px;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .blog-item:hover img {
            transform: scale(1.08);
        }

        .blog-title {
            margin-top: 12px;
            text-align: center;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Nghia's Blog</h1>
        <p>Animation, Storytelling and Personal Journey</p>
        <a href="../index.html" class="button">← Back to Portfolio</a>
    </div>

    <div class="blog-grid">
        <a href="/blog/post1.html" class="blog-item">
            <div class="image-wrapper"><img src="../images/pic02.jpg"></div>
            <div class="blog-title">Starting My 2D Animation Journey</div>
        </a>

        <a href="/blog/post2.html" class="blog-item">
            <div class="image-wrapper"><img src="../images/pic02.jpg"></div>
            <div class="blog-title">Storyboard Workflow for Short Film</div>
        </a>

        <a href="/blog/post3.html" class="blog-item">
            <div class="image-wrapper"><img src="../images/pic02.jpg"></div>
            <div class="blog-title">Bringing Characters to Life</div>
        </a>

        <a href="/blog/post4.html" class="blog-item">
            <div class="image-wrapper"><img src="../images/pic02.jpg"></div>
            <div class="blog-title">Thinking Like a Director</div>
        </a>

        <a href="/blog/post5.html" class="blog-item">
            <div class="image-wrapper"><img src="../images/pic02.jpg"></div>
            <div class="blog-title">Creative Process in Animation</div>
        </a>

        <a href="/blog/post6.html" class="blog-item">
            <div class="image-wrapper"><img src="../images/pic02.jpg"></div>
            <div class="blog-title">How to Tell Better Stories</div>
        </a>
    </div>

    <div class="footer">
        © 2026 Nghia X Portfolio
    </div>

</div>

</body>
</html>
