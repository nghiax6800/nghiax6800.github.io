<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog của Nghĩa | 2D Animator</title>
    <style>
        /* Cài đặt font chữ cơ bản (bạn có thể đổi theo font của template cũ) */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1b1f22; /* Màu nền tối, bạn có thể đổi nếu muốn */
            color: #ffffff;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Container chứa toàn bộ nội dung */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        /* Phần Tiêu đề và Nút quay lại */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border: 1px solid #ffffff;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #ffffff;
            color: #1b1f22;
        }

        /* Lưới chứa các bài blog */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        /* Từng bài blog riêng lẻ */
        .blog-item {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        /* Hiệu ứng khi di chuột vào bài viết */
        .blog-item:hover {
            transform: translateY(-8px);
        }

        /* Khung chứa ảnh (Bắt buộc là hình vuông) */
        .image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1; /* Tạo hình vuông hoàn hảo */
            overflow: hidden;
            border-radius: 12px; /* Bo góc ảnh */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Ảnh bên trong khung */
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Đảm bảo ảnh lấp đầy khung mà không bị méo */
            transition: transform 0.5s ease;
        }

        /* Hiệu ứng zoom nhẹ ảnh khi hover */
        .blog-item:hover .image-wrapper img {
            transform: scale(1.08);
        }

        /* Tên bài viết */
        .blog-title {
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Nghia X's Blog</h1>
            <p>Những câu chuyện, kinh nghiệm và góc nhìn về Animation.</p>
            <a href="index.html" class="back-btn">← Quay lại Trang Chủ</a>
        </div>

        <div class="blog-grid">
            <a href="#" class="blog-item">
                <div class="image-wrapper">
                    <img src="images/pic02.jpg" alt="Thumbnail bài viết 1">
                </div>
                <div class="blog-title">Hành trình bắt đầu với 2D Animation</div>
            </a>

            <a href="#" class="blog-item">
                <div class="image-wrapper">
                    <img src="images/pic03.jpg" alt="Thumbnail bài viết 2">
                </div>
                <div class="blog-title">Quy trình Storyboard cho phim ngắn</div>
            </a>

            <a href="#" class="blog-item">
                <div class="image-wrapper">
                    <img src="images/INTRO.png" alt="Thumbnail bài viết 3">
                </div>
                <div class="blog-title">Cách thổi hồn vào nhân vật</div>
            </a>
            
            <a href="#" class="blog-item">
                <div class="image-wrapper">
                    <img src="https://via.placeholder.com/500" alt="Thumbnail bài viết 4">
                </div>
                <div class="blog-title">Góc nhìn của một Director</div>
            </a>
        </div>
    </div>

</body>
</html>
